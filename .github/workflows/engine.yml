name: osrs-engine

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape methods
        run: python scrape_methods.py

      - name: Run profit engine
        run: python profit_engine.py

      - name: Detect flips
        run: python flip_detector.py

      - name: Export site data
        run: python export_for_site.py

      - name: Commit results
        run: |
          git config --global user.name bot
          git config --global user.email bot@users.noreply.github.com
          git add .
          git commit -m "update market data" || echo "no changes"
          git push
