name: osrs-engine

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:

  run:

    runs-on: ubuntu-latest

    steps:

      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install deps
        run: pip install -r requirements.txt

      - name: scrape methods
        run: python scrape_methods.py

      - name: run profit engine
        run: python profit_engine.py

      - name: detect flips
        run: python flip_detector.py

      - name: export site data
        run: python export_for_site.py

      - name: commit results
        run: |
          git config --global user.name bot
          git config --global user.email bot@users.noreply.github.com
          git add .
          git commit -m "update market data" || echo "no changes"
          git push
