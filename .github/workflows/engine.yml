name: osrs-engine

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Scrape methods
        run: |
          python scrape_methods.py

      - name: Calculate profit
        run: |
          python profit_engine.py

      - name: Export site data
        run: |
          python export_for_site.py

      - name: Commit results
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "auto update" || echo "no changes"
          git push
