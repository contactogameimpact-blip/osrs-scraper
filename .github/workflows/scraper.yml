name: OSRS Money Engine

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  run-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run profit engine
        run: python profit_engine.py

      - name: Commit updated money_methods.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add money_methods.json
          git commit -m "Update money_methods.json" || echo "No changes to commit"
          git push
