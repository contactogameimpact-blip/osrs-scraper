name: run-engine

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python scrape_methods.py

      - run: python profit_engine.py

      - name: commit results
        run: |
          git config --global user.name bot
          git config --global user.email bot@users.noreply.github.com
          git add methods_base.json
          git add money_methods.json
          git commit -m "update methods" || echo "no changes"
          git push
